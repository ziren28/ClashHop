<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClashHop - 链式节点管理面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .node-item {
      transition: all 0.2s ease;
    }
    .node-item:hover {
      background: rgba(51, 65, 85, 0.8);
    }
    .drag-handle {
      cursor: grab;
    }
    .drag-handle:active {
      cursor: grabbing;
    }
    .sortable-ghost {
      opacity: 0.4;
      background: rgba(99, 102, 241, 0.2);
    }
    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    #toast {
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s, opacity 0.3s linear;
    }
    #toast.show {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

  <div class="max-w-5xl w-full">
    <header class="mb-10 text-center md:text-left flex flex-col md:flex-row items-center justify-between">
      <div>
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tight">
          ClashHop 🚀
        </h1>
        <p class="text-slate-400 mt-2 text-sm">链式代理 (Relay) 落地节点配置生成器 | 本地缓存，绝对安全</p>
      </div>
      <button onclick="generateAndCopy()" class="mt-6 md:mt-0 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
        生成并复制脚本
      </button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      
      <div class="md:col-span-1 glass-panel rounded-2xl p-6 h-fit sticky top-8">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-indigo-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          新增落地节点
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">节点名称 (必填)</label>
            <input type="text" id="nodeName" placeholder="例如: ⛓️ 落地-美西VPS" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm placeholder-slate-500 transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">分享链接 (支持 ss/vless/vmess/socks5)</label>
            <textarea id="nodeLink" rows="4" placeholder="ss://..." class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono placeholder-slate-500 transition resize-none"></textarea>
          </div>
          <button onclick="addNode()" class="w-full bg-slate-700 hover:bg-indigo-600 text-white font-medium py-2.5 rounded-lg transition duration-200">
            加入配置列表
          </button>
        </div>
      </div>

      <div class="md:col-span-2 glass-panel rounded-2xl p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-indigo-300 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            当前节点列表
          </h2>
          <span class="text-xs text-slate-400 bg-slate-800 px-2 py-1 rounded">支持拖拽排序</span>
        </div>
        
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-12 text-slate-500">
          <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
          <p>列表空空如也，请在左侧添加节点</p>
        </div>

        <ul id="nodeList" class="space-y-3">
          </ul>
      </div>

    </div>
  </div>

  <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 z-50">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    <span id="toastMsg">脚本已成功复制到剪贴板！</span>
  </div>

  <script type="text/plain" id="scriptTemplate">
function main(params) {
  // ╔═══════════════════════════════════════════════════╗
  // ║  📝 节点配置区 (由 ClashHop 面板自动生成)           ║
  // ╚═══════════════════════════════════════════════════╝
  var MY_VPS_LINKS = __INJECT_NODES_HERE__;

  var CHAIN_RULES = [
    "DOMAIN-SUFFIX,ippure.com",
  ];

  var EXCLUDE_KEYWORDS = [
    "Traffic", "Expire", "流量", "到期", "剩余", "套餐", "官网", "公告"
  ];

  var FIRST_HOP_NAME = "🛫 第一跳-机场入口";

  var MAIN_GROUP_NAMES = [
    "Proxies", "proxies", "PROXY", "Proxy", "proxy",
    "🚀 节点选择", "节点选择", "♻️ 自动选择", "自动选择",
    "🔰 节点选择", "Select", "select",
  ];

  function base64Decode(str) {
    var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    var output = "";
    var buffer = 0;
    var bits = 0;
    for (var i = 0; i < str.length; i++) {
      var c = str.charAt(i);
      if (c === '=') break;
      var idx = chars.indexOf(c);
      if (idx === -1) continue;
      buffer = (buffer << 6) | idx;
      bits += 6;
      if (bits >= 8) {
        bits -= 8;
        output += String.fromCharCode((buffer >> bits) & 0xFF);
      }
    }
    return output;
  }

  function parseQueryString(qs) {
    var result = {};
    if (!qs) return result;
    var pairs = qs.split('&');
    for (var i = 0; i < pairs.length; i++) {
      var eqIdx = pairs[i].indexOf('=');
      if (eqIdx === -1) {
        result[pairs[i]] = "";
      } else {
        var key = pairs[i].substring(0, eqIdx);
        var val = pairs[i].substring(eqIdx + 1);
        try { val = decodeURIComponent(val); } catch(e) {}
        result[key] = val;
      }
    }
    return result;
  }

  function parseURI(uri) {
    var result = { user: "", pass: "", server: "", port: 0 };
    var hostport = uri;
    if (uri.indexOf('@') !== -1) {
      var atIdx = uri.indexOf('@');
      var userinfo = uri.substring(0, atIdx);
      hostport = uri.substring(atIdx + 1);
      var colonIdx = userinfo.indexOf(':');
      if (colonIdx !== -1) {
        result.user = userinfo.substring(0, colonIdx);
        result.pass = userinfo.substring(colonIdx + 1);
        try { result.user = decodeURIComponent(result.user); } catch(e) {}
        try { result.pass = decodeURIComponent(result.pass); } catch(e) {}
      } else {
        result.user = userinfo;
        try { result.user = decodeURIComponent(result.user); } catch(e) {}
      }
    }
    var lastColon = hostport.lastIndexOf(':');
    if (lastColon !== -1) {
      result.server = hostport.substring(0, lastColon);
      result.port = parseInt(hostport.substring(lastColon + 1));
    } else {
      result.server = hostport;
    }
    if (result.server.charAt(0) === '[' && result.server.charAt(result.server.length - 1) === ']') {
      result.server = result.server.substring(1, result.server.length - 1);
    }
    return result;
  }

  function parseSS(link, customName) {
    var uri = link.replace("ss://", "");
    var name = customName || "";
    var hashIdx = uri.indexOf('#');
    if (hashIdx !== -1) {
      if (!name) { try { name = decodeURIComponent(uri.substring(hashIdx + 1)); } catch(e) { name = uri.substring(hashIdx + 1); } }
      uri = uri.substring(0, hashIdx);
    }
    var qIdx = uri.indexOf('?');
    if (qIdx !== -1) uri = uri.substring(0, qIdx);
    var server, port, cipher, password;
    if (uri.indexOf('@') !== -1) {
      var atIdx = uri.indexOf('@');
      var userinfo = uri.substring(0, atIdx);
      var hostport = uri.substring(atIdx + 1);
      var decoded;
      try { decoded = base64Decode(userinfo); } catch(e) { decoded = userinfo; }
      var colonIdx = decoded.indexOf(':');
      cipher = decoded.substring(0, colonIdx);
      password = decoded.substring(colonIdx + 1);
      var lastColon = hostport.lastIndexOf(':');
      server = hostport.substring(0, lastColon);
      port = parseInt(hostport.substring(lastColon + 1));
    } else {
      var decoded2 = base64Decode(uri);
      return parseSS("ss://" + decoded2, customName);
    }
    if (!name) name = "SS-" + server + ":" + port;
    return { name: name, type: "ss", server: server, port: port, cipher: cipher, password: password, udp: true };
  }

  function parseVless(link, customName) {
    var uri = link.replace("vless://", "");
    var name = customName || "";
    var hashIdx = uri.indexOf('#');
    if (hashIdx !== -1) {
      if (!name) { try { name = decodeURIComponent(uri.substring(hashIdx + 1)); } catch(e) { name = uri.substring(hashIdx + 1); } }
      uri = uri.substring(0, hashIdx);
    }
    var qIdx = uri.indexOf('?');
    var queryStr = "";
    if (qIdx !== -1) { queryStr = uri.substring(qIdx + 1); uri = uri.substring(0, qIdx); }
    var p = parseQueryString(queryStr);
    var atIdx = uri.indexOf('@');
    var uuid = uri.substring(0, atIdx);
    var hostport = uri.substring(atIdx + 1);
    var lastColon = hostport.lastIndexOf(':');
    var server = hostport.substring(0, lastColon);
    var port = parseInt(hostport.substring(lastColon + 1));
    if (!name) name = "VLESS-" + server + ":" + port;
    var node = { name: name, type: "vless", server: server, port: port, uuid: uuid, network: p.type || "tcp", udp: true };
    var security = p.security || "";
    if (security === "reality") {
      node.tls = true; node["reality-opts"] = {};
      if (p.pbk) node["reality-opts"]["public-key"] = p.pbk;
      if (p.sid) node["reality-opts"]["short-id"] = p.sid;
      if (p.spx) node["reality-opts"]["spider-x"] = p.spx;
      if (p.sni) node.servername = p.sni;
      if (p.fp) node["client-fingerprint"] = p.fp;
      node["skip-cert-verify"] = false;
    } else if (security === "tls") {
      node.tls = true;
      if (p.sni) node.servername = p.sni;
      if (p.fp) node["client-fingerprint"] = p.fp;
      if (p.alpn) node.alpn = p.alpn.split(',');
      node["skip-cert-verify"] = false;
    }
    if (node.network === "ws") {
      node["ws-opts"] = {};
      if (p.path) node["ws-opts"].path = p.path;
      if (p.host) node["ws-opts"].headers = { Host: p.host };
    } else if (node.network === "grpc") {
      node["grpc-opts"] = {};
      if (p.serviceName) node["grpc-opts"]["grpc-service-name"] = p.serviceName;
    }
    if (p.flow) node.flow = p.flow;
    return node;
  }

  function parseVmess(link, customName) {
    var encoded = link.replace("vmess://", "");
    var jsonStr = base64Decode(encoded);
    var json = JSON.parse(jsonStr);
    var name = customName || json.ps || ("VMess-" + json.add + ":" + json.port);
    var node = {
      name: name, type: "vmess", server: json.add, port: parseInt(json.port), uuid: json.id,
      alterId: parseInt(json.aid) || 0, cipher: json.scy || "auto", network: json.net || "tcp", udp: true
    };
    if (json.tls === "tls") {
      node.tls = true;
      if (json.sni) node.servername = json.sni;
      if (json.fp) node["client-fingerprint"] = json.fp;
      if (json.alpn) node.alpn = json.alpn.split(',');
      node["skip-cert-verify"] = (json.insecure === "1");
    }
    if (node.network === "ws") {
      node["ws-opts"] = {};
      if (json.path) node["ws-opts"].path = json.path;
      if (json.host) node["ws-opts"].headers = { Host: json.host };
    } else if (node.network === "grpc") {
      node["grpc-opts"] = {};
      if (json.path) node["grpc-opts"]["grpc-service-name"] = json.path;
    } else if (node.network === "h2") {
      node["h2-opts"] = {};
      if (json.path) node["h2-opts"].path = json.path;
      if (json.host) node["h2-opts"].host = [json.host];
    }
    return node;
  }

  function parseSocks5(link, customName) {
    var uri = link.replace("socks5h://", "").replace("socks5://", "").replace("socks://", "");
    var name = customName || "";
    var hashIdx = uri.indexOf('#');
    if (hashIdx !== -1) {
      if (!name) { try { name = decodeURIComponent(uri.substring(hashIdx + 1)); } catch(e) { name = uri.substring(hashIdx + 1); } }
      uri = uri.substring(0, hashIdx);
    }
    var qIdx = uri.indexOf('?');
    if (qIdx !== -1) uri = uri.substring(0, qIdx);
    var info = parseURI(uri);
    if (!name) name = "SOCKS5-" + info.server + ":" + info.port;
    var node = { name: name, type: "socks5", server: info.server, port: info.port, udp: true };
    if (info.user) node.username = info.user;
    if (info.pass) node.password = info.pass;
    return node;
  }

  function parseHTTP(link, customName) {
    var useTls = false;
    var uri = link;
    if (uri.indexOf("https://") === 0) { useTls = true; uri = uri.replace("https://", ""); } 
    else { uri = uri.replace("http://", ""); }
    var name = customName || "";
    var hashIdx = uri.indexOf('#');
    if (hashIdx !== -1) {
      if (!name) { try { name = decodeURIComponent(uri.substring(hashIdx + 1)); } catch(e) { name = uri.substring(hashIdx + 1); } }
      uri = uri.substring(0, hashIdx);
    }
    var qIdx = uri.indexOf('?');
    if (qIdx !== -1) uri = uri.substring(0, qIdx);
    var info = parseURI(uri);
    if (!name) name = "HTTP-" + info.server + ":" + info.port;
    var node = { name: name, type: "http", server: info.server, port: info.port };
    if (info.user) node.username = info.user;
    if (info.pass) node.password = info.pass;
    if (useTls) { node.tls = true; node["skip-cert-verify"] = true; }
    return node;
  }

  function parseLink(item) {
    try {
      var link = item.link.trim();
      var customName = item.name || "";
      if (link.indexOf("ss://") === 0) return parseSS(link, customName);
      if (link.indexOf("vless://") === 0) return parseVless(link, customName);
      if (link.indexOf("vmess://") === 0) return parseVmess(link, customName);
      if (link.indexOf("socks5://") === 0 || link.indexOf("socks://") === 0 || link.indexOf("socks5h://") === 0) return parseSocks5(link, customName);
      if (link.indexOf("http://") === 0 || link.indexOf("https://") === 0) return parseHTTP(link, customName);
      return null;
    } catch(e) { return null; }
  }

  if (!params.proxies) params.proxies = [];
  if (!params['proxy-groups']) params['proxy-groups'] = [];
  if (!params.rules) params.rules = [];

  var MY_VPS_NODES = [];
  for (var i = 0; i < MY_VPS_LINKS.length; i++) {
    var node = parseLink(MY_VPS_LINKS[i]);
    if (node) MY_VPS_NODES.push(node);
  }

  if (MY_VPS_NODES.length === 0) return params;

  function findMainGroup() {
    for (var i = 0; i < MAIN_GROUP_NAMES.length; i++) {
      for (var j = 0; j < params['proxy-groups'].length; j++) {
        if (params['proxy-groups'][j].name === MAIN_GROUP_NAMES[i]) return params['proxy-groups'][j];
      }
    }
    for (var k = 0; k < params['proxy-groups'].length; k++) {
      if (params['proxy-groups'][k].type === "select") return params['proxy-groups'][k];
    }
    return params['proxy-groups'][0] || null;
  }

  var mainGroup = findMainGroup();
  if (!mainGroup) return params;

  var vpsNames = [];
  for (var i = 0; i < MY_VPS_NODES.length; i++) vpsNames.push(MY_VPS_NODES[i].name);

  var airportNodes = [];
  for (var i = 0; i < params.proxies.length; i++) {
    var pName = params.proxies[i].name;
    var excluded = false;
    for (var j = 0; j < EXCLUDE_KEYWORDS.length; j++) {
      if (pName.indexOf(EXCLUDE_KEYWORDS[j]) !== -1) { excluded = true; break; }
    }
    if (!excluded) {
      var isVps = false;
      for (var k = 0; k < vpsNames.length; k++) {
        if (pName === vpsNames[k]) { isVps = true; break; }
      }
      if (!isVps) airportNodes.push(pName);
    }
  }

  if (airportNodes.length === 0) return params;

  params['proxy-groups'].unshift({
    name: FIRST_HOP_NAME,
    type: "select",
    proxies: airportNodes,
  });

  var chainProxyNames = [];
  for (var i = 0; i < MY_VPS_NODES.length; i++) {
    var newNode = {};
    var src = MY_VPS_NODES[i];
    for (var key in src) { if (src.hasOwnProperty(key)) newNode[key] = src[key]; }
    newNode["dialer-proxy"] = FIRST_HOP_NAME;
    params.proxies.push(newNode);
    chainProxyNames.push(src.name);
  }

  if (mainGroup.proxies) {
    for (var i = chainProxyNames.length - 1; i >= 0; i--) {
      var exists = false;
      for (var j = 0; j < mainGroup.proxies.length; j++) {
        if (mainGroup.proxies[j] === chainProxyNames[i]) { exists = true; break; }
      }
      if (!exists) mainGroup.proxies.unshift(chainProxyNames[i]);
    }
  }

  if (CHAIN_RULES.length > 0 && chainProxyNames.length > 0) {
    var targetProxy = chainProxyNames[0];
    var newRules = [];
    for (var i = 0; i < CHAIN_RULES.length; i++) newRules.push(CHAIN_RULES[i] + "," + targetProxy);
    var merged = [];
    for (var i = 0; i < newRules.length; i++) merged.push(newRules[i]);
    for (var i = 0; i < params.rules.length; i++) merged.push(params.rules[i]);
    params.rules = merged;
  }

  return params;
}
  </script>

  <script>
    // --- 核心业务逻辑 ---

    const STORAGE_KEY = 'clashhop_nodes';
    let nodes = [];

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadNodes();
      renderNodes();
      
      // 初始化拖拽排序
      const el = document.getElementById('nodeList');
      new Sortable(el, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd: function (evt) {
          const itemEl = nodes.splice(evt.oldIndex, 1)[0];
          nodes.splice(evt.newIndex, 0, itemEl);
          saveNodes();
        },
      });
    });

    function loadNodes() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          nodes = JSON.parse(saved);
        } catch(e) {
          console.error("加载本地数据失败");
        }
      }
    }

    function saveNodes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));
    }

    function getProtocolIcon(link) {
      if(link.startsWith('ss://')) return 'badge-ss';
      if(link.startsWith('vless://')) return 'badge-vless';
      if(link.startsWith('vmess://')) return 'badge-vmess';
      if(link.startsWith('socks')) return 'badge-socks';
      if(link.startsWith('http')) return 'badge-http';
      return 'badge-unknown';
    }
    
    function getProtocolName(link) {
      return link.split('://')[0].toUpperCase();
    }

    // 渲染列表
    function renderNodes() {
      const list = document.getElementById('nodeList');
      const emptyState = document.getElementById('emptyState');
      
      list.innerHTML = '';
      
      if (nodes.length === 0) {
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        
        nodes.forEach((node, index) => {
          const proto = getProtocolName(node.link);
          const shortLink = node.link.length > 50 ? node.link.substring(0, 47) + '...' : node.link;
          
          const li = document.createElement('li');
          li.className = "node-item bg-slate-800/80 border border-slate-600 rounded-xl p-3 flex items-center justify-between shadow-sm group";
          li.innerHTML = `
            <div class="flex items-center gap-4 overflow-hidden">
              <div class="drag-handle text-slate-500 hover:text-indigo-400 p-2 -ml-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
              </div>
              <div class="flex flex-col overflow-hidden">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xs font-bold bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded border border-indigo-500/30">${proto}</span>
                  <span class="font-medium text-slate-200 truncate cursor-pointer hover:text-indigo-300 transition" onclick="renameNode(${index})" title="点击重命名">${escapeHtml(node.name)}</span>
                </div>
                <span class="text-xs text-slate-500 font-mono truncate">${escapeHtml(shortLink)}</span>
              </div>
            </div>
            <button onclick="deleteNode(${index})" class="text-slate-500 hover:text-rose-400 p-2 rounded-lg hover:bg-rose-500/10 transition opacity-0 group-hover:opacity-100 flex-shrink-0">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          `;
          list.appendChild(li);
        });
      }
    }

    // 添加节点
    function addNode() {
      const nameInput = document.getElementById('nodeName');
      const linkInput = document.getElementById('nodeLink');
      
      const name = nameInput.value.trim();
      let link = linkInput.value.trim();

      if (!name) {
        showToast("请输入节点名称！", false);
        nameInput.focus();
        return;
      }
      
      if (!link || !link.includes('://')) {
        showToast("请输入有效的分享链接！", false);
        linkInput.focus();
        return;
      }

      // 如果链接自带 #name，处理一下，以用户填写的 Name 优先
      const hashIdx = link.indexOf('#');
      if (hashIdx !== -1) {
        link = link.substring(0, hashIdx); // 剥离原有名字
      }
      // 拼上新的名字，保持标准URI格式
      link = link + '#' + encodeURIComponent(name);

      nodes.push({ name, link });
      saveNodes();
      renderNodes();
      
      // 清空表单
      nameInput.value = '';
      linkInput.value = '';
      showToast("节点添加成功！");
    }

    // 删除节点
    function deleteNode(index) {
      if (confirm(`确定要删除 "${nodes[index].name}" 吗？`)) {
        nodes.splice(index, 1);
        saveNodes();
        renderNodes();
      }
    }

    // 重命名节点
    function renameNode(index) {
      const newName = prompt("请输入新的节点名称：", nodes[index].name);
      if (newName !== null && newName.trim() !== '') {
        nodes[index].name = newName.trim();
        
        // 更新 link 里的 hash name
        let link = nodes[index].link;
        const hashIdx = link.indexOf('#');
        if (hashIdx !== -1) {
          link = link.substring(0, hashIdx);
        }
        nodes[index].link = link + '#' + encodeURIComponent(nodes[index].name);

        saveNodes();
        renderNodes();
      }
    }

    // 生成并复制脚本
    function generateAndCopy() {
      if (nodes.length === 0) {
        showToast("列表为空，请先添加节点！", false);
        return;
      }

      // 1. 获取原模板
      const template = document.getElementById('scriptTemplate').textContent;
      
      // 2. 将 nodes 数组格式化为美观的 JSON 字符串
      const jsonString = JSON.stringify(nodes, null, 4);
      
      // 3. 注入到模板中
      const finalScript = template.replace('__INJECT_NODES_HERE__', jsonString);

      // 4. 复制到剪贴板
      navigator.clipboard.writeText(finalScript).then(() => {
        showToast("🚀 脚本已成功复制到剪贴板！可以直接去 Clash 粘贴了。");
      }).catch(err => {
        console.error('复制失败:', err);
        showToast("复制失败，请检查浏览器权限。", false);
      });
    }

    // 工具函数：防止 XSS
    function escapeHtml(unsafe) {
      return unsafe
           .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
           .replace(/>/g, "&gt;")
           .replace(/"/g, "&quot;")
           .replace(/'/g, "&#039;");
    }

    // Toast 提示
    let toastTimeout;
    function showToast(message, isSuccess = true) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      
      toastMsg.textContent = message;
      
      if (isSuccess) {
        toast.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 z-50";
      } else {
        toast.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-rose-500 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 z-50";
      }

      toast.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
